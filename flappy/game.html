<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird - Simsim Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #4ec0ca 0%, #4ec0ca 60%, #dee894 60%, #dee894 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameWrapper {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #543847;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 8px;
            overflow-y: auto;
        }
        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #543847;
        }
        .overlay p {
            font-size: 18px;
            margin: 10px 0;
        }
        .overlay .score-display {
            font-size: 36px;
            color: #ffd700;
            margin: 20px 0;
        }
        .btn {
            margin-top: 15px;
            padding: 15px 40px;
            font-size: 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn:hover {
            background: #ff8e8e;
            transform: scale(1.05);
        }
        .btn-secondary {
            background: #4ecdc4;
            margin-left: 10px;
        }
        .btn-secondary:hover {
            background: #6ee0d8;
        }
        .btn-small {
            padding: 10px 20px;
            font-size: 14px;
        }
        #startScreen {
            display: flex;
        }
        #gameOverScreen {
            display: none;
        }
        .instructions {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 15px;
        }
        .high-score {
            font-size: 16px;
            color: #ffd700;
            margin-top: 10px;
        }
        /* 랭킹 스타일 */
        .leaderboard {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            width: 90%;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
        }
        .leaderboard h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #ffd700;
            text-align: center;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .leaderboard-item:nth-child(2) {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.3), transparent);
        }
        .leaderboard-item:nth-child(3) {
            background: linear-gradient(90deg, rgba(192, 192, 192, 0.3), transparent);
        }
        .leaderboard-item:nth-child(4) {
            background: linear-gradient(90deg, rgba(205, 127, 50, 0.3), transparent);
        }
        .leaderboard-item .rank {
            width: 25px;
            font-weight: bold;
        }
        .leaderboard-item .name {
            flex: 1;
            text-align: left;
            margin-left: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .leaderboard-item .score {
            font-weight: bold;
            color: #ffd700;
        }
        .leaderboard-item.me {
            background: rgba(78, 205, 196, 0.3);
            border: 1px solid #4ecdc4;
        }
        .login-prompt {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }
        .login-prompt a {
            color: #4ecdc4;
        }
        .user-info-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            z-index: 10;
        }
        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4ecdc4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .saving-indicator {
            font-size: 12px;
            color: #4ecdc4;
            margin-top: 5px;
        }
        @media (max-width: 420px) {
            #gameCanvas {
                width: 100vw;
                height: 80vh;
                max-width: 400px;
                max-height: 600px;
            }
            .overlay h1 {
                font-size: 32px;
            }
            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
            .leaderboard {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <!-- 유저 정보 바 -->
        <div class="user-info-bar" id="userInfoBar" style="display: none;">
            <div class="user-avatar" id="gameUserAvatar">?</div>
            <span id="gameUserName">게스트</span>
        </div>

        <div id="startScreen" class="overlay">
            <h1>Flappy Bird</h1>
            <p>파이프 사이를 날아가세요!</p>
            <p class="instructions">스페이스바 / 클릭 / 터치로 점프</p>
            <p class="high-score" id="startHighScore"></p>

            <!-- 랭킹 -->
            <div class="leaderboard" id="startLeaderboard">
                <h3>🏆 TOP 5</h3>
                <div id="startRankingList"></div>
            </div>

            <button class="btn" onclick="startGame()">게임 시작</button>
            <a href="../index.html" class="btn btn-secondary">홈으로</a>
            <p class="login-prompt" id="loginPrompt">
                <a href="../auth.html">로그인</a>하면 점수가 저장됩니다!
            </p>
        </div>

        <div id="gameOverScreen" class="overlay">
            <h1>Game Over</h1>
            <p class="score-display">점수: <span id="finalScore">0</span></p>
            <p class="high-score" id="highScoreText"></p>
            <p class="saving-indicator" id="savingIndicator"></p>

            <!-- 랭킹 -->
            <div class="leaderboard" id="gameOverLeaderboard">
                <h3>🏆 TOP 5</h3>
                <div id="gameOverRankingList"></div>
            </div>

            <div>
                <button class="btn" onclick="startGame()">다시 시작</button>
                <a href="../index.html" class="btn btn-secondary">홈으로</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
    <script src="../js/supabase.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GAME_ID = 'flappy';

        // 게임 상태
        let gameState = {
            isRunning: false,
            score: 0,
            highScore: parseInt(localStorage.getItem('flappyHighScore')) || 0
        };

        // 현재 유저
        let currentUser = null;

        // 새
        const bird = {
            x: 80,
            y: 300,
            width: 40,
            height: 30,
            velocity: 0,
            gravity: 0.5,
            jump: -10,
            rotation: 0
        };

        // 파이프
        let pipes = [];
        const pipeWidth = 70;
        const pipeGap = 160;
        const pipeSpeed = 3;

        // 땅
        const ground = {
            y: 550,
            height: 50
        };

        // 배경 스크롤
        let groundOffset = 0;

        // Delta time 관련
        let lastTime = 0;
        const TARGET_FPS = 60;
        const FRAME_TIME = 1000 / TARGET_FPS; // 16.67ms

        // 유저 정보 업데이트
        async function updateUserInfo() {
            currentUser = await getCurrentUser();
            const userInfoBar = document.getElementById('userInfoBar');
            const loginPrompt = document.getElementById('loginPrompt');

            if (currentUser) {
                const nickname = currentUser.user_metadata?.nickname || currentUser.email.split('@')[0];
                document.getElementById('gameUserName').textContent = nickname;
                document.getElementById('gameUserAvatar').textContent = nickname.charAt(0).toUpperCase();
                userInfoBar.style.display = 'flex';
                loginPrompt.style.display = 'none';

                // 서버에서 내 최고 점수 가져오기
                try {
                    const serverHighScore = await getMyHighScore(GAME_ID);
                    if (serverHighScore > gameState.highScore) {
                        gameState.highScore = serverHighScore;
                        localStorage.setItem('flappyHighScore', serverHighScore);
                    }
                } catch (e) {
                    console.log('최고 점수 로드 실패:', e);
                }
            } else {
                userInfoBar.style.display = 'none';
                loginPrompt.style.display = 'block';
            }
            updateHighScoreDisplay();
        }

        // 랭킹 로드
        async function loadLeaderboard(containerId) {
            const container = document.getElementById(containerId);
            try {
                const rankings = await getLeaderboard(GAME_ID, 5);

                if (rankings.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.5);">아직 기록이 없습니다</p>';
                    return;
                }

                let html = '';
                rankings.forEach((item, index) => {
                    const isMe = currentUser && item.user_id === currentUser.id;
                    const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}`;
                    html += `
                        <div class="leaderboard-item ${isMe ? 'me' : ''}">
                            <span class="rank">${medal}</span>
                            <span class="name">${item.nickname}</span>
                            <span class="score">${item.score}</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (e) {
                console.log('랭킹 로드 실패:', e);
                container.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.5);">랭킹을 불러올 수 없습니다</p>';
            }
        }

        // 점수 저장
        async function saveGameScore(score) {
            if (!currentUser) return;

            const indicator = document.getElementById('savingIndicator');
            indicator.textContent = '점수 저장 중...';

            try {
                await saveScore(GAME_ID, score);
                indicator.textContent = '✓ 점수가 저장되었습니다!';
            } catch (e) {
                console.log('점수 저장 실패:', e);
                indicator.textContent = '점수 저장 실패';
            }
        }

        // 최고 점수 표시
        function updateHighScoreDisplay() {
            document.getElementById('startHighScore').textContent =
                gameState.highScore > 0 ? `내 최고 점수: ${gameState.highScore}` : '';
        }

        // 새 그리기
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);

            bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.velocity * 0.05));
            ctx.rotate(bird.rotation);

            ctx.fillStyle = '#f7dc6f';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fdeaa8';
            ctx.beginPath();
            ctx.ellipse(5, 5, bird.width / 3, bird.height / 3, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(10, -5, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(12, -5, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(25, 3);
            ctx.lineTo(15, 6);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#f0b90b';
            ctx.beginPath();
            ctx.ellipse(-5, 5, 10, 6, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // 파이프 그리기
        function drawPipe(pipe) {
            const gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
            gradient.addColorStop(0, '#73bf2e');
            gradient.addColorStop(0.5, '#8ed142');
            gradient.addColorStop(1, '#73bf2e');

            ctx.fillStyle = gradient;
            ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);

            ctx.fillStyle = '#5a9c24';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, pipeWidth + 10, 30);
            ctx.fillStyle = '#8ed142';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, pipeWidth + 10, 5);

            ctx.fillStyle = gradient;
            ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);

            ctx.fillStyle = '#5a9c24';
            ctx.fillRect(pipe.x - 5, pipe.bottomY, pipeWidth + 10, 30);
            ctx.fillStyle = '#8ed142';
            ctx.fillRect(pipe.x - 5, pipe.bottomY, pipeWidth + 10, 5);
        }

        // 배경 그리기
        function drawBackground() {
            const skyGradient = ctx.createLinearGradient(0, 0, 0, ground.y);
            skyGradient.addColorStop(0, '#4ec0ca');
            skyGradient.addColorStop(1, '#7ed6df');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, ground.y);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            drawCloud(50, 80, 60);
            drawCloud(200, 150, 40);
            drawCloud(320, 60, 50);

            ctx.fillStyle = '#dee894';
            ctx.fillRect(0, ground.y, canvas.width, ground.height);

            ctx.fillStyle = '#c4d66e';
            for (let i = 0; i < canvas.width + 20; i += 20) {
                const offset = (groundOffset + i) % (canvas.width + 20);
                ctx.beginPath();
                ctx.moveTo(offset - 10, ground.y);
                ctx.lineTo(offset, ground.y + 10);
                ctx.lineTo(offset + 10, ground.y);
                ctx.fill();
            }
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.2, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawScore() {
            ctx.fillStyle = 'white';
            ctx.strokeStyle = '#543847';
            ctx.lineWidth = 4;
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.strokeText(gameState.score, canvas.width / 2, 60);
            ctx.fillText(gameState.score, canvas.width / 2, 60);
        }

        function spawnPipe() {
            const minHeight = 80;
            const maxHeight = ground.y - pipeGap - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + pipeGap,
                passed: false
            });
        }

        function checkCollision() {
            if (bird.y + bird.height > ground.y) return true;
            if (bird.y < 0) return true;

            for (const pipe of pipes) {
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipeWidth) {
                    if (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomY) {
                        return true;
                    }
                }
            }
            return false;
        }

        function update(dt) {
            if (!gameState.isRunning) return;

            bird.velocity += bird.gravity * dt;
            bird.y += bird.velocity * dt;

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed * dt;

                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    pipes[i].passed = true;
                    gameState.score++;
                }

                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            groundOffset = (groundOffset + pipeSpeed * dt) % 20;

            if (checkCollision()) {
                gameOver();
            }
        }

        function render() {
            drawBackground();
            for (const pipe of pipes) {
                drawPipe(pipe);
            }
            drawBird();
            drawScore();
        }

        let pipeTimer = 0;
        const PIPE_SPAWN_INTERVAL = 90; // 90프레임 = 1.5초 (60fps 기준)

        function gameLoop(currentTime) {
            if (!gameState.isRunning) return;

            // Delta time 계산 (60fps 기준으로 정규화)
            if (lastTime === 0) lastTime = currentTime;
            const deltaTime = (currentTime - lastTime) / FRAME_TIME;
            lastTime = currentTime;

            // 너무 큰 delta time 방지 (탭 전환 등)
            const dt = Math.min(deltaTime, 3);

            update(dt);
            render();

            pipeTimer += dt;
            if (pipeTimer > PIPE_SPAWN_INTERVAL) {
                spawnPipe();
                pipeTimer = 0;
            }

            requestAnimationFrame(gameLoop);
        }

        function jump() {
            if (!gameState.isRunning) return;
            bird.velocity = bird.jump;
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('savingIndicator').textContent = '';

            gameState = {
                isRunning: true,
                score: 0,
                highScore: gameState.highScore
            };

            bird.y = 300;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes = [];
            pipeTimer = 0;
            lastTime = 0;

            requestAnimationFrame(gameLoop);
        }

        async function gameOver() {
            gameState.isRunning = false;

            // 최고 점수 갱신
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('flappyHighScore', gameState.highScore);
                document.getElementById('highScoreText').textContent = '🎉 새로운 최고 기록!';
            } else {
                document.getElementById('highScoreText').textContent = `내 최고 점수: ${gameState.highScore}`;
            }

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOverScreen').style.display = 'flex';
            updateHighScoreDisplay();

            // 서버에 점수 저장
            if (currentUser && gameState.score > 0) {
                await saveGameScore(gameState.score);
            }

            // 랭킹 새로고침
            await loadLeaderboard('gameOverRankingList');
        }

        // 이벤트 리스너
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // 초기화
        async function init() {
            await updateUserInfo();
            await loadLeaderboard('startRankingList');
            drawBackground();
            drawBird();
        }

        init();
    </script>
</body>
</html>
