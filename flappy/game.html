<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #4ec0ca 0%, #4ec0ca 60%, #dee894 60%, #dee894 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameWrapper {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #543847;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 8px;
        }
        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #543847;
        }
        .overlay p {
            font-size: 18px;
            margin: 10px 0;
        }
        .overlay .score-display {
            font-size: 36px;
            color: #ffd700;
            margin: 20px 0;
        }
        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn:hover {
            background: #ff8e8e;
            transform: scale(1.05);
        }
        .btn-secondary {
            background: #4ecdc4;
            margin-left: 10px;
        }
        .btn-secondary:hover {
            background: #6ee0d8;
        }
        #startScreen {
            display: flex;
        }
        #gameOverScreen {
            display: none;
        }
        .instructions {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 15px;
        }
        .high-score {
            font-size: 16px;
            color: #ffd700;
            margin-top: 10px;
        }
        @media (max-width: 420px) {
            #gameCanvas {
                width: 100vw;
                height: 80vh;
                max-width: 400px;
                max-height: 600px;
            }
            .overlay h1 {
                font-size: 32px;
            }
            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div id="startScreen" class="overlay">
            <h1>Flappy Bird</h1>
            <p>파이프 사이를 날아가세요!</p>
            <p class="instructions">스페이스바 / 클릭 / 터치로 점프</p>
            <p class="high-score" id="startHighScore"></p>
            <button class="btn" onclick="startGame()">게임 시작</button>
            <a href="../index.html" class="btn btn-secondary">홈으로</a>
        </div>

        <div id="gameOverScreen" class="overlay">
            <h1>Game Over</h1>
            <p class="score-display">점수: <span id="finalScore">0</span></p>
            <p class="high-score" id="highScoreText"></p>
            <div>
                <button class="btn" onclick="startGame()">다시 시작</button>
                <a href="../index.html" class="btn btn-secondary">홈으로</a>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 게임 상태
        let gameState = {
            isRunning: false,
            score: 0,
            highScore: parseInt(localStorage.getItem('flappyHighScore')) || 0
        };

        // 새
        const bird = {
            x: 80,
            y: 300,
            width: 40,
            height: 30,
            velocity: 0,
            gravity: 0.5,
            jump: -10,
            rotation: 0
        };

        // 파이프
        let pipes = [];
        const pipeWidth = 70;
        const pipeGap = 160;
        const pipeSpeed = 3;

        // 땅
        const ground = {
            y: 550,
            height: 50
        };

        // 배경 스크롤
        let groundOffset = 0;

        // 최고 점수 표시
        function updateHighScoreDisplay() {
            document.getElementById('startHighScore').textContent =
                gameState.highScore > 0 ? `최고 점수: ${gameState.highScore}` : '';
        }
        updateHighScoreDisplay();

        // 새 그리기
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);

            // 속도에 따른 회전
            bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.velocity * 0.05));
            ctx.rotate(bird.rotation);

            // 몸통
            ctx.fillStyle = '#f7dc6f';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // 배
            ctx.fillStyle = '#fdeaa8';
            ctx.beginPath();
            ctx.ellipse(5, 5, bird.width / 3, bird.height / 3, 0, 0, Math.PI * 2);
            ctx.fill();

            // 눈
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(10, -5, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(12, -5, 4, 0, Math.PI * 2);
            ctx.fill();

            // 부리
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(25, 3);
            ctx.lineTo(15, 6);
            ctx.closePath();
            ctx.fill();

            // 날개
            ctx.fillStyle = '#f0b90b';
            ctx.beginPath();
            ctx.ellipse(-5, 5, 10, 6, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // 파이프 그리기
        function drawPipe(pipe) {
            const gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
            gradient.addColorStop(0, '#73bf2e');
            gradient.addColorStop(0.5, '#8ed142');
            gradient.addColorStop(1, '#73bf2e');

            // 위쪽 파이프
            ctx.fillStyle = gradient;
            ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);

            // 위쪽 파이프 끝부분
            ctx.fillStyle = '#5a9c24';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, pipeWidth + 10, 30);
            ctx.fillStyle = '#8ed142';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, pipeWidth + 10, 5);

            // 아래쪽 파이프
            ctx.fillStyle = gradient;
            ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);

            // 아래쪽 파이프 끝부분
            ctx.fillStyle = '#5a9c24';
            ctx.fillRect(pipe.x - 5, pipe.bottomY, pipeWidth + 10, 30);
            ctx.fillStyle = '#8ed142';
            ctx.fillRect(pipe.x - 5, pipe.bottomY, pipeWidth + 10, 5);
        }

        // 배경 그리기
        function drawBackground() {
            // 하늘
            const skyGradient = ctx.createLinearGradient(0, 0, 0, ground.y);
            skyGradient.addColorStop(0, '#4ec0ca');
            skyGradient.addColorStop(1, '#7ed6df');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, ground.y);

            // 구름
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            drawCloud(50, 80, 60);
            drawCloud(200, 150, 40);
            drawCloud(320, 60, 50);

            // 땅
            ctx.fillStyle = '#dee894';
            ctx.fillRect(0, ground.y, canvas.width, ground.height);

            // 풀 패턴
            ctx.fillStyle = '#c4d66e';
            for (let i = 0; i < canvas.width + 20; i += 20) {
                const offset = (groundOffset + i) % (canvas.width + 20);
                ctx.beginPath();
                ctx.moveTo(offset - 10, ground.y);
                ctx.lineTo(offset, ground.y + 10);
                ctx.lineTo(offset + 10, ground.y);
                ctx.fill();
            }
        }

        // 구름 그리기
        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.2, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        // 점수 그리기
        function drawScore() {
            ctx.fillStyle = 'white';
            ctx.strokeStyle = '#543847';
            ctx.lineWidth = 4;
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.strokeText(gameState.score, canvas.width / 2, 60);
            ctx.fillText(gameState.score, canvas.width / 2, 60);
        }

        // 파이프 생성
        function spawnPipe() {
            const minHeight = 80;
            const maxHeight = ground.y - pipeGap - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + pipeGap,
                passed: false
            });
        }

        // 충돌 감지
        function checkCollision() {
            // 땅 충돌
            if (bird.y + bird.height > ground.y) {
                return true;
            }

            // 천장 충돌
            if (bird.y < 0) {
                return true;
            }

            // 파이프 충돌
            for (const pipe of pipes) {
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipeWidth) {
                    if (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomY) {
                        return true;
                    }
                }
            }

            return false;
        }

        // 게임 업데이트
        function update() {
            if (!gameState.isRunning) return;

            // 새 물리
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // 파이프 이동
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;

                // 점수 계산
                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    pipes[i].passed = true;
                    gameState.score++;
                }

                // 화면 밖 파이프 제거
                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            // 땅 스크롤
            groundOffset = (groundOffset + pipeSpeed) % 20;

            // 충돌 체크
            if (checkCollision()) {
                gameOver();
            }
        }

        // 렌더링
        function render() {
            drawBackground();

            for (const pipe of pipes) {
                drawPipe(pipe);
            }

            drawBird();
            drawScore();
        }

        // 게임 루프
        let pipeTimer = 0;
        function gameLoop() {
            if (!gameState.isRunning) return;

            update();
            render();

            pipeTimer++;
            if (pipeTimer > 90) {
                spawnPipe();
                pipeTimer = 0;
            }

            requestAnimationFrame(gameLoop);
        }

        // 점프
        function jump() {
            if (!gameState.isRunning) return;
            bird.velocity = bird.jump;
        }

        // 게임 시작
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';

            gameState = {
                isRunning: true,
                score: 0,
                highScore: gameState.highScore
            };

            bird.y = 300;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes = [];
            pipeTimer = 0;

            gameLoop();
        }

        // 게임 오버
        function gameOver() {
            gameState.isRunning = false;

            // 최고 점수 갱신
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('flappyHighScore', gameState.highScore);
                document.getElementById('highScoreText').textContent = '새로운 최고 기록!';
            } else {
                document.getElementById('highScoreText').textContent = `최고 점수: ${gameState.highScore}`;
            }

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOverScreen').style.display = 'flex';
            updateHighScoreDisplay();
        }

        // 이벤트 리스너
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // 초기 화면
        drawBackground();
        drawBird();
    </script>
</body>
</html>
