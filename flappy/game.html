<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
    <link rel="icon" type="image/png" href="../favicon.png">
    <meta property="og:title" content="Simsim Games">
    <meta property="og:description" content="미니 게임 컬렉션">
    <meta property="og:image" content="https://dalrea.github.io/simsim/main_logo/mainlogo_big.png">
    <title>Flappy Bird - Simsim Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #4ec0ca 0%, #4ec0ca 60%, #dee894 60%, #dee894 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameWrapper {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #543847;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            max-width: 100%;
            height: auto;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border-radius: 8px;
            overflow-y: auto;
        }
        .overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #543847;
        }
        .overlay p {
            font-size: 18px;
            margin: 10px 0;
        }
        .overlay .score-display {
            font-size: 36px;
            color: #ffd700;
            margin: 20px 0;
        }
        .btn {
            margin-top: 15px;
            padding: 15px 40px;
            font-size: 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn:hover {
            background: #ff8e8e;
            transform: scale(1.05);
        }
        .btn-secondary {
            background: #4ecdc4;
            margin-left: 10px;
        }
        .btn-secondary:hover {
            background: #6ee0d8;
        }
        .btn-small {
            padding: 10px 20px;
            font-size: 14px;
        }
        #startScreen {
            display: flex;
        }
        #gameOverScreen {
            display: none;
        }
        .instructions {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 15px;
        }
        .high-score {
            font-size: 16px;
            color: #ffd700;
            margin-top: 10px;
        }
        /* 랭킹 스타일 */
        .leaderboard {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            width: 90%;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
        }
        .leaderboard h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #ffd700;
            text-align: center;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .leaderboard-item:nth-child(2) {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.3), transparent);
        }
        .leaderboard-item:nth-child(3) {
            background: linear-gradient(90deg, rgba(192, 192, 192, 0.3), transparent);
        }
        .leaderboard-item:nth-child(4) {
            background: linear-gradient(90deg, rgba(205, 127, 50, 0.3), transparent);
        }
        .leaderboard-item .rank {
            width: 25px;
            font-weight: bold;
        }
        .leaderboard-item .name {
            flex: 1;
            text-align: left;
            margin-left: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .leaderboard-item .score {
            font-weight: bold;
            color: #ffd700;
        }
        .leaderboard-item.me {
            background: rgba(78, 205, 196, 0.3);
            border: 1px solid #4ecdc4;
        }
        .login-prompt {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }
        .login-prompt a {
            color: #4ecdc4;
        }
        .user-info-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            z-index: 10;
        }
        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4ecdc4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .saving-indicator {
            font-size: 12px;
            color: #4ecdc4;
            margin-top: 5px;
        }
        @media (max-width: 420px) {
            #gameCanvas {
                width: 100vw;
                height: 80vh;
                max-width: 400px;
                max-height: 600px;
            }
            .overlay h1 {
                font-size: 32px;
            }
            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
            .leaderboard {
                max-height: 150px;
            }
        }
        /* 도감 버튼 */
        .collection-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .collection-btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        /* 도감 모달 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .modal-overlay.hidden {
            display: none;
        }
        .hidden {
            display: none !important;
        }
        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            color: white;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 22px;
            font-weight: bold;
        }
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        /* 탭 */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
        }
        .tab.active {
            background: #4ecdc4;
        }
        /* 아이템 그리드 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .item-card {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        .item-card:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .item-card.locked {
            opacity: 0.5;
            cursor: pointer;
        }
        .item-card .item-icon {
            font-size: 28px;
        }
        .item-card .item-name {
            font-size: 10px;
            margin-top: 4px;
            text-align: center;
        }
        .item-card .lock-icon {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 12px;
        }
        /* 장착된 아이템만 레어도별 테두리와 배경색 표시 */
        .item-card.equipped.rarity-common {
            border-color: #aaa;
            background: rgba(170, 170, 170, 0.2);
        }
        .item-card.equipped.rarity-uncommon {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.2);
        }
        .item-card.equipped.rarity-rare {
            border-color: #3498db;
            background: rgba(52, 152, 219, 0.2);
        }
        .item-card.equipped.rarity-epic {
            border-color: #9b59b6;
            background: rgba(155, 89, 182, 0.2);
        }
        .item-card.equipped.rarity-legendary {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.2);
        }
        /* 진행도 */
        .progress-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .progress-title {
            font-size: 14px;
            margin-bottom: 10px;
            color: #ffd700;
        }
        .progress-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 12px;
        }
        .progress-stat {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 8px;
        }
        .progress-stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #4ecdc4;
        }
        /* 새 아이템 알림 */
        .new-item-alert {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 15px;
            animation: pulse 1s infinite;
            display: block;
        }
        .new-item-alert.hidden {
            display: none !important;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .new-item-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .new-item-reason {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }
        /* 잠긴 아이템 상세 모달 */
        .item-detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            padding: 20px;
        }
        .item-detail-modal.hidden {
            display: none;
        }
        .item-detail-card {
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 300px;
            width: 100%;
            color: white;
            position: relative;
        }
        .item-detail-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .item-detail-icon {
            font-size: 64px;
            margin-bottom: 15px;
            filter: grayscale(80%);
        }
        .item-detail-name {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .item-detail-rarity {
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 20px;
            padding: 4px 12px;
            border-radius: 10px;
            display: inline-block;
        }
        .item-detail-rarity.common { background: #666; }
        .item-detail-rarity.uncommon { background: #2ecc71; }
        .item-detail-rarity.rare { background: #3498db; }
        .item-detail-rarity.epic { background: #9b59b6; }
        .item-detail-rarity.legendary { background: #f39c12; }
        .item-detail-unlock {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }
        .item-detail-unlock-title {
            font-size: 12px;
            color: #ffd700;
            margin-bottom: 8px;
        }
        .item-detail-unlock-desc {
            font-size: 16px;
        }
        .item-card.locked {
            opacity: 0.5;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <!-- 도감 버튼 -->
        <button class="collection-btn" onclick="openCollection()">
            <span>👕</span>
            <span>도감</span>
        </button>

        <!-- 유저 정보 바 -->
        <div class="user-info-bar" id="userInfoBar" style="display: none;">
            <div class="user-avatar" id="gameUserAvatar">?</div>
            <span id="gameUserName">게스트</span>
        </div>

        <div id="startScreen" class="overlay">
            <h1>Flappy Bird</h1>
            <p>파이프 사이를 날아가세요!</p>
            <p class="instructions">스페이스바 / 클릭 / 터치로 점프</p>
            <p class="high-score" id="startHighScore"></p>

            <!-- 랭킹 -->
            <div class="leaderboard" id="startLeaderboard">
                <h3>🏆 TOP 5</h3>
                <div id="startRankingList"></div>
            </div>

            <button class="btn" onclick="startGame()">게임 시작</button>
            <a href="../index.html" class="btn btn-secondary">홈으로</a>
            <p class="login-prompt" id="loginPrompt">
                <a href="../auth.html">로그인</a>하면 점수가 저장됩니다!
            </p>
        </div>

        <div id="gameOverScreen" class="overlay">
            <h1>Game Over</h1>
            <p class="score-display">점수: <span id="finalScore">0</span></p>
            <p class="high-score" id="highScoreText"></p>
            <p class="saving-indicator" id="savingIndicator"></p>

            <!-- 새 아이템 해금 알림 -->
            <div class="new-item-alert hidden" id="newItemAlert">
                <div class="new-item-icon" id="newItemIcon">🎉</div>
                <div><strong>새 아이템 해금!</strong></div>
                <div id="newItemName"></div>
                <div class="new-item-reason" id="newItemReason"></div>
            </div>

            <!-- 랭킹 -->
            <div class="leaderboard" id="gameOverLeaderboard">
                <h3>🏆 TOP 5</h3>
                <div id="gameOverRankingList"></div>
            </div>

            <div>
                <button class="btn" onclick="startGame()">다시 시작</button>
                <a href="../index.html" class="btn btn-secondary">홈으로</a>
            </div>
        </div>
    </div>

    <!-- 도감 모달 -->
    <div class="modal-overlay hidden" id="collectionModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">👕 도감</div>
                <button class="modal-close" onclick="closeCollection()">×</button>
            </div>

            <!-- 진행도 -->
            <div class="progress-section">
                <div class="progress-title">📊 내 기록</div>
                <div class="progress-stats">
                    <div class="progress-stat">
                        <div>최고 점수</div>
                        <div class="progress-stat-value" id="statBestScore">0</div>
                    </div>
                    <div class="progress-stat">
                        <div>총 게임</div>
                        <div class="progress-stat-value" id="statTotalGames">0</div>
                    </div>
                    <div class="progress-stat">
                        <div>총 점수</div>
                        <div class="progress-stat-value" id="statTotalScore">0</div>
                    </div>
                    <div class="progress-stat">
                        <div>통과 파이프</div>
                        <div class="progress-stat-value" id="statTotalPipes">0</div>
                    </div>
                </div>
            </div>

            <!-- 탭 -->
            <div class="tabs">
                <button class="tab active" onclick="showTab('hat')">🎩 모자</button>
                <button class="tab" onclick="showTab('glasses')">🕶️ 안경</button>
                <button class="tab" onclick="showTab('accessory')">🎀 악세</button>
                <button class="tab" onclick="showTab('skin')">🐦 스킨</button>
            </div>

            <!-- 아이템 그리드 -->
            <div class="items-grid" id="itemsGrid"></div>
        </div>
    </div>

    <!-- 잠긴 아이템 상세 모달 -->
    <div class="item-detail-modal hidden" id="itemDetailModal">
        <div class="item-detail-card">
            <button class="item-detail-close" onclick="closeItemDetail()">×</button>
            <div class="item-detail-icon" id="detailItemIcon">🔒</div>
            <div class="item-detail-name" id="detailItemName">아이템 이름</div>
            <div class="item-detail-rarity" id="detailItemRarity">common</div>
            <div class="item-detail-unlock">
                <div class="item-detail-unlock-title">🔓 해금 조건</div>
                <div class="item-detail-unlock-desc" id="detailUnlockDesc">해금 조건 설명</div>
            </div>
        </div>
    </div>

        // 유저 진행도 로드
        async function loadUserProgress() {
            // 먼저 로컬 스토리지에서 로드
            const saved = localStorage.getItem('flappyProgress');
            if (saved) {
                userProgress = JSON.parse(saved);
            }
            const savedUnlocked = localStorage.getItem('flappyUnlocked');
            if (savedUnlocked) {
                unlockedItems = JSON.parse(savedUnlocked);
            }
            const savedEquipped = localStorage.getItem('flappyEquipped');
            if (savedEquipped) {
                equippedItems = JSON.parse(savedEquipped);
            }

            if (!currentUser) {
                return;
            }

            try {
                // 진행도 로드
                const { data: progressData, error } = await supabase
                    .from('user_flappy_progress')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .single();

                if (progressData) {
                    // 서버 데이터와 로컬 데이터 중 더 큰 값 사용 (병합)
                    userProgress = {
                        total_games: Math.max(progressData.total_games || 0, userProgress.total_games || 0),
                        total_score: Math.max(progressData.total_score || 0, userProgress.total_score || 0),
                        total_pipes: Math.max(progressData.total_pipes || 0, userProgress.total_pipes || 0),
                        best_score: Math.max(progressData.best_score || 0, userProgress.best_score || 0)
                    };
                    equippedItems = {
                        hat: progressData.equipped_hat || equippedItems.hat,
                        glasses: progressData.equipped_glasses || equippedItems.glasses,
                        accessory: progressData.equipped_accessory || equippedItems.accessory,
                        skin: progressData.equipped_skin || equippedItems.skin
                    };
                }

                // 해금된 아이템 로드
                const { data: itemsData } = await supabase
                    .from('user_flappy_items')
                    .select('item_id')
                    .eq('user_id', currentUser.id);

                if (itemsData) {
                    const serverUnlockedItems = itemsData.map(i => i.item_id);
                    // 로컬과 서버의 해금 아이템 병합 (중복 제거)
                    unlockedItems = [...new Set([...unlockedItems, ...serverUnlockedItems])];
                }

                // 병합된 데이터가 있으면 로컬과 서버에 저장
                if (saved || progressData || (itemsData && itemsData.length > 0)) {
                    await saveUserProgress();
                }
            } catch (e) {
                console.log('진행도 로드 실패');
            }
        }

        // 진행도 저장
        async function saveUserProgress() {
            // 로컬 저장
            localStorage.setItem('flappyProgress', JSON.stringify(userProgress));
            localStorage.setItem('flappyUnlocked', JSON.stringify(unlockedItems));
            localStorage.setItem('flappyEquipped', JSON.stringify(equippedItems));

            if (!currentUser) {
                return;
            }

            try {
                await supabase.from('user_flappy_progress').upsert({
                    user_id: currentUser.id,
                    total_games: userProgress.total_games,
                    total_score: userProgress.total_score,
                    total_pipes: userProgress.total_pipes,
                    best_score: userProgress.best_score,
                    equipped_hat: equippedItems.hat,
                    equipped_glasses: equippedItems.glasses,
                    equipped_accessory: equippedItems.accessory,
                    equipped_skin: equippedItems.skin,
                    updated_at: new Date().toISOString()
                });
            } catch (e) {
                console.log('진행도 저장 실패');
            }
        }

        // 아이템 해금
        async function unlockItem(itemId) {
            if (unlockedItems.includes(itemId)) return false;

            unlockedItems.push(itemId);
            localStorage.setItem('flappyUnlocked', JSON.stringify(unlockedItems));

            if (currentUser) {
                try {
                    // upsert 대신 먼저 존재 여부 확인 후 insert
                    const { data: existing } = await supabase
                        .from('user_flappy_items')
                        .select('item_id')
                        .eq('user_id', currentUser.id)
                        .eq('item_id', itemId)
                        .single();

                    if (!existing) {
                        await supabase.from('user_flappy_items').insert({
                            user_id: currentUser.id,
                            item_id: itemId
                        });
                    }
                } catch (e) {
                    // 에러는 무시 (이미 존재하거나 네트워크 오류)
                }
            }
            return true;
        }

        // 해금 조건 체크
        async function checkUnlocks(score, pipes) {
            // localStorage에서 최신 해금 정보 다시 로드 (동기화 보장)
            const savedUnlocked = localStorage.getItem('flappyUnlocked');
            if (savedUnlocked) {
                unlockedItems = JSON.parse(savedUnlocked);
            }

            const newUnlocks = [];

            for (const item of allItems) {
                // 이중 체크: 이미 해금된 아이템은 건너뛰기
                if (unlockedItems.includes(item.id)) {
                    continue;
                }

                let shouldUnlock = false;

                switch (item.unlock_type) {
                    case 'default':
                        shouldUnlock = true;
                        break;
                    case 'score':
                        shouldUnlock = score >= item.unlock_value;
                        break;
                    case 'cumulative_score':
                        shouldUnlock = userProgress.total_score >= item.unlock_value;
                        break;
                    case 'cumulative_games':
                        shouldUnlock = userProgress.total_games >= item.unlock_value;
                        break;
                    case 'cumulative_pipes':
                        shouldUnlock = userProgress.total_pipes >= item.unlock_value;
                        break;
                }

                if (shouldUnlock) {
                    const unlocked = await unlockItem(item.id);
                    if (unlocked) {
                        // 다시 한번 확인: 정말로 새로 해금되었는지 체크
                        // (동시성 이슈나 중복 호출 방지)
                        if (!newUnlocks.find(i => i.id === item.id)) {
                            newUnlocks.push(item);
                        }
                    }
                }
            }

            return newUnlocks;
        }

                equippedItems[item.type] = null;
            } else {
                equippedItems[item.type] = item.id;
            }

            await saveUserProgress();
            renderItems();
        }

        // 새 그리기
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);

            bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.velocity * 0.05));
            ctx.rotate(bird.rotation);

            // 스킨에 따른 색상
            const skin = getEquippedItem('skin');
            let bodyColor = '#f7dc6f';
            let bodyColor2 = '#fdeaa8';
            let wingColor = '#f0b90b';

            if (skin) {
                switch (skin.id) {
                    case 40: // 골드버드
                        bodyColor = '#ffd700';
                        bodyColor2 = '#ffec8b';
                        wingColor = '#daa520';
                        break;
                    case 41: // 피닉스
                        bodyColor = '#ff6347';
                        bodyColor2 = '#ff7f50';
                        wingColor = '#ff4500';
                        break;
                    case 42: // 아이스버드
                        bodyColor = '#87ceeb';
                        bodyColor2 = '#b0e0e6';
                        wingColor = '#4682b4';
                        break;
                    case 43: // 레인보우
                        const time = Date.now() / 500;
                        bodyColor = `hsl(${(time * 50) % 360}, 70%, 60%)`;
                        bodyColor2 = `hsl(${(time * 50 + 30) % 360}, 70%, 70%)`;
                        wingColor = `hsl(${(time * 50 + 60) % 360}, 70%, 50%)`;
                        break;
                }
            }

            // 몸통
            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // 배
            ctx.fillStyle = bodyColor2;
            ctx.beginPath();
            ctx.ellipse(5, 5, bird.width / 3, bird.height / 3, 0, 0, Math.PI * 2);
            ctx.fill();

            // 눈 흰자
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(10, -5, 8, 0, Math.PI * 2);
            ctx.fill();

            // 눈동자
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(12, -5, 4, 0, Math.PI * 2);
            ctx.fill();

            // 부리
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(25, 3);
            ctx.lineTo(15, 6);
            ctx.closePath();
            ctx.fill();

            // 날개
            ctx.fillStyle = wingColor;
            ctx.beginPath();
            ctx.ellipse(-5, 5, 10, 6, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();

            // 장착 아이템 렌더링
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // 모자
            const hat = getEquippedItem('hat');
            if (hat) {
                ctx.font = '20px Arial';
                ctx.fillText(hat.icon, 0, -22);
            }

            // 안경
            const glasses = getEquippedItem('glasses');
            if (glasses) {
                ctx.font = '14px Arial';
                ctx.fillText(glasses.icon, 8, -5);
            }

            // 악세서리
            const accessory = getEquippedItem('accessory');
            if (accessory) {
                ctx.font = '14px Arial';
                ctx.fillText(accessory.icon, -15, -10);
            }

            ctx.restore();
        }

        // 파이프 그리기
        function drawPipe(pipe) {
            const gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
            gradient.addColorStop(0, '#73bf2e');
            gradient.addColorStop(0.5, '#8ed142');
            gradient.addColorStop(1, '#73bf2e');

            ctx.fillStyle = gradient;
            ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);

            ctx.fillStyle = '#5a9c24';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, pipeWidth + 10, 30);
            ctx.fillStyle = '#8ed142';
            ctx.fillRect(pipe.x - 5, pipe.topHeight - 30, pipeWidth + 10, 5);

            ctx.fillStyle = gradient;
            ctx.fillRect(pipe.x, pipe.bottomY, pipeWidth, canvas.height - pipe.bottomY);

            ctx.fillStyle = '#5a9c24';
            ctx.fillRect(pipe.x - 5, pipe.bottomY, pipeWidth + 10, 30);
            ctx.fillStyle = '#8ed142';
            ctx.fillRect(pipe.x - 5, pipe.bottomY, pipeWidth + 10, 5);
        }

        // 배경 그리기
        function drawBackground() {
            const skyGradient = ctx.createLinearGradient(0, 0, 0, ground.y);
            skyGradient.addColorStop(0, '#4ec0ca');
            skyGradient.addColorStop(1, '#7ed6df');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, ground.y);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            drawCloud(50, 80, 60);
            drawCloud(200, 150, 40);
            drawCloud(320, 60, 50);

            ctx.fillStyle = '#dee894';
            ctx.fillRect(0, ground.y, canvas.width, ground.height);

            ctx.fillStyle = '#c4d66e';
            for (let i = 0; i < canvas.width + 20; i += 20) {
                const offset = (groundOffset + i) % (canvas.width + 20);
                ctx.beginPath();
                ctx.moveTo(offset - 10, ground.y);
                ctx.lineTo(offset, ground.y + 10);
                ctx.lineTo(offset + 10, ground.y);
                ctx.fill();
            }
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y, size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.2, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawScore() {
            ctx.fillStyle = 'white';
            ctx.strokeStyle = '#543847';
            ctx.lineWidth = 4;
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.strokeText(gameState.score, canvas.width / 2, 60);
            ctx.fillText(gameState.score, canvas.width / 2, 60);
        }

        function spawnPipe() {
            const minHeight = 80;
            const maxHeight = ground.y - pipeGap - minHeight;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                bottomY: topHeight + pipeGap,
                passed: false
            });
        }

        function checkCollision() {
            if (bird.y + bird.height > ground.y) return true;
            if (bird.y < 0) return true;

            for (const pipe of pipes) {
                if (bird.x + bird.width > pipe.x && bird.x < pipe.x + pipeWidth) {
                    if (bird.y < pipe.topHeight || bird.y + bird.height > pipe.bottomY) {
                        return true;
                    }
                }
            }
            return false;
        }

        function update(dt) {
            if (!gameState.isRunning) return;

            bird.velocity += bird.gravity * dt;
            bird.y += bird.velocity * dt;

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed * dt;

                if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
                    pipes[i].passed = true;
                    gameState.score++;
                }

                if (pipes[i].x + pipeWidth < 0) {
                    pipes.splice(i, 1);
                }
            }

            groundOffset = (groundOffset + pipeSpeed * dt) % 20;

            if (checkCollision()) {
                gameOver();
            }
        }

        function render() {
            drawBackground();
            for (const pipe of pipes) {
                drawPipe(pipe);
            }
            drawBird();
            drawScore();
        }

        let pipeTimer = 0;
        const PIPE_SPAWN_INTERVAL = 90; // 90프레임 = 1.5초 (60fps 기준)

        function gameLoop(currentTime) {
            if (!gameState.isRunning) return;

            // Delta time 계산 (60fps 기준으로 정규화)
            if (lastTime === 0) lastTime = currentTime;
            const deltaTime = (currentTime - lastTime) / FRAME_TIME;
            lastTime = currentTime;

            // 너무 큰 delta time 방지 (탭 전환 등)
            const dt = Math.min(deltaTime, 3);

            update(dt);
            render();

            pipeTimer += dt;
            if (pipeTimer > PIPE_SPAWN_INTERVAL) {
                spawnPipe();
                pipeTimer = 0;
            }

            requestAnimationFrame(gameLoop);
        }

        function jump() {
            if (!gameState.isRunning) return;
            bird.velocity = bird.jump;
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('savingIndicator').textContent = '';
            hideNewItemAlert(); // 이전 게임의 아이템 알림 숨기기

            gameState = {
                isRunning: true,
                score: 0,
                highScore: gameState.highScore
            };

            bird.y = 300;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes = [];
            pipeTimer = 0;
            lastTime = 0;

            requestAnimationFrame(gameLoop);
        }

        async function gameOver() {
            gameState.isRunning = false;

            // 통과한 파이프 수 계산
            const pipesCleared = gameState.score;

            // 진행도 업데이트
            userProgress.total_games++;
            userProgress.total_score += gameState.score;
            userProgress.total_pipes += pipesCleared;
            if (gameState.score > userProgress.best_score) {
                userProgress.best_score = gameState.score;
            }

            // 진행도 저장 먼저 (해금 체크 전에)
            await saveUserProgress();

            // 해금 체크
            const newUnlocks = await checkUnlocks(gameState.score, pipesCleared);

            // 새 아이템 알림 (새로 해금된 아이템이 있을 때만)
            hideNewItemAlert();
            if (newUnlocks.length > 0) {
                showNewItemAlert(newUnlocks);
            }

            // 최고 점수 갱신
            if (gameState.score > gameState.highScore) {
                gameState.highScore = gameState.score;
                localStorage.setItem('flappyHighScore', gameState.highScore);
                document.getElementById('highScoreText').textContent = '🎉 새로운 최고 기록!';
            } else {
                document.getElementById('highScoreText').textContent = `내 최고 점수: ${gameState.highScore}`;
            }

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOverScreen').style.display = 'flex';
            updateHighScoreDisplay();

            // 서버에 점수 저장
            if (currentUser && gameState.score > 0) {
                await saveGameScore(gameState.score);
            }

            // 랭킹 새로고침
            await loadLeaderboard('gameOverRankingList');
        }

        // 이벤트 리스너
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });

        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // 초기화
        async function init() {
            await updateUserInfo();
            await loadItems();
            await loadUserProgress();

            // 기본 아이템 해금 체크
            await checkUnlocks(0, 0);

            await loadLeaderboard('startRankingList');
            drawBackground();
            drawBird();
        }

        // 모달 바깥 클릭시 닫기
        document.getElementById('collectionModal').addEventListener('click', (e) => {
            if (e.target.id === 'collectionModal') {
                closeCollection();
            }
        });

        // 잠긴 아이템 상세 모달 바깥 클릭시 닫기
        document.getElementById('itemDetailModal').addEventListener('click', (e) => {
            if (e.target.id === 'itemDetailModal') {
                closeItemDetail();
            }
        });

        init();
    </script>
</body>
</html>
