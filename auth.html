<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Simsim Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #fff;
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: transparent;
            font-size: 16px;
        }
        .tab.active {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .tab:hover {
            color: #fff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #4ecdc4;
            background: rgba(0, 0, 0, 0.3);
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #44b3ab);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }
        .btn-google {
            background: #fff;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background: #f0f0f0;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.4);
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }
        .divider span {
            padding: 0 15px;
            font-size: 14px;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .message.error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            display: block;
        }
        .message.success {
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            display: block;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #fff;
        }
        #signupForm {
            display: none;
        }
        .loading {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>Simsim Games</h1>

        <div class="tabs">
            <button class="tab active" onclick="showLogin()">로그인</button>
            <button class="tab" onclick="showSignup()">회원가입</button>
        </div>

        <div id="message" class="message"></div>

        <!-- 로그인 폼 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginEmail">이메일</label>
                <input type="email" id="loginEmail" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">비밀번호</label>
                <input type="password" id="loginPassword" placeholder="비밀번호 입력" required>
            </div>
            <button type="submit" class="btn btn-primary">로그인</button>
        </form>

        <!-- 회원가입 폼 -->
        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="signupNickname">닉네임</label>
                <input type="text" id="signupNickname" placeholder="게임에서 사용할 닉네임" required minlength="2" maxlength="20">
            </div>
            <div class="form-group">
                <label for="signupEmail">이메일</label>
                <input type="email" id="signupEmail" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label for="signupPassword">비밀번호</label>
                <input type="password" id="signupPassword" placeholder="6자 이상" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">회원가입</button>
        </form>

        <div class="divider"><span>또는</span></div>

        <button class="btn btn-google" onclick="handleGoogleLogin()">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google로 계속하기
        </button>

        <a href="index.html" class="back-link">← 게임 목록으로 돌아가기</a>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        // 탭 전환
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.querySelectorAll('.tab')[1].classList.remove('active');
            hideMessage();
        }

        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.querySelectorAll('.tab')[0].classList.remove('active');
            document.querySelectorAll('.tab')[1].classList.add('active');
            hideMessage();
        }

        // 메시지 표시
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        // 로그인 처리
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                document.querySelector('.auth-container').classList.add('loading');
                await signIn(email, password);
                showMessage('로그인 성공! 이동 중...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                showMessage(getErrorMessage(error), 'error');
            } finally {
                document.querySelector('.auth-container').classList.remove('loading');
            }
        }

        // 회원가입 처리
        async function handleSignup(e) {
            e.preventDefault();
            const nickname = document.getElementById('signupNickname').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            try {
                document.querySelector('.auth-container').classList.add('loading');
                await signUp(email, password, nickname);
                showMessage('회원가입 완료! 이메일을 확인해주세요.', 'success');
            } catch (error) {
                showMessage(getErrorMessage(error), 'error');
            } finally {
                document.querySelector('.auth-container').classList.remove('loading');
            }
        }

        // 구글 로그인
        async function handleGoogleLogin() {
            try {
                await signInWithGoogle();
            } catch (error) {
                showMessage(getErrorMessage(error), 'error');
            }
        }

        // 에러 메시지 변환
        function getErrorMessage(error) {
            const messages = {
                'Invalid login credentials': '이메일 또는 비밀번호가 올바르지 않습니다.',
                'User already registered': '이미 가입된 이메일입니다.',
                'Password should be at least 6 characters': '비밀번호는 6자 이상이어야 합니다.',
                'Unable to validate email address': '유효하지 않은 이메일 주소입니다.'
            };
            return messages[error.message] || error.message;
        }

        // 이미 로그인되어 있으면 리다이렉트
        (async () => {
            const user = await getCurrentUser();
            if (user) {
                window.location.href = 'index.html';
            }
        })();
    </script>
</body>
</html>
