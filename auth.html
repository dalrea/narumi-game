<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Simsim Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #fff;
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: transparent;
            font-size: 16px;
        }
        .tab.active {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .tab:hover {
            color: #fff;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #4ecdc4;
            background: rgba(0, 0, 0, 0.3);
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #44b3ab);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
        }
        .btn-google {
            background: #fff;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background: #f0f0f0;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.4);
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }
        .divider span {
            padding: 0 15px;
            font-size: 14px;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .message.error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            display: block;
        }
        .message.success {
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            display: block;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #fff;
        }
        #signupForm {
            display: none;
        }
        .loading {
            pointer-events: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>Simsim Games</h1>

        <div class="tabs">
            <button class="tab active" onclick="showLogin()">로그인</button>
            <button class="tab" onclick="showSignup()">회원가입</button>
        </div>

        <div id="message" class="message"></div>

        <!-- 로그인 폼 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginUsername">아이디</label>
                <input type="text" id="loginUsername" placeholder="아이디 입력" required minlength="3" maxlength="20">
            </div>
            <div class="form-group">
                <label for="loginPassword">비밀번호</label>
                <input type="password" id="loginPassword" placeholder="비밀번호 입력" required>
            </div>
            <button type="submit" class="btn btn-primary">로그인</button>
        </form>

        <!-- 회원가입 폼 -->
        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="signupUsername">아이디</label>
                <input type="text" id="signupUsername" placeholder="영문, 숫자 3~20자" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9]+">
            </div>
            <div class="form-group">
                <label for="signupNickname">닉네임</label>
                <input type="text" id="signupNickname" placeholder="게임에서 사용할 닉네임" required minlength="2" maxlength="20">
            </div>
            <div class="form-group">
                <label for="signupPassword">비밀번호</label>
                <input type="password" id="signupPassword" placeholder="6자 이상" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">회원가입</button>
        </form>

        <a href="index.html" class="back-link">← 게임 목록으로 돌아가기</a>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        // 탭 전환
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.querySelectorAll('.tab')[1].classList.remove('active');
            hideMessage();
        }

        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.querySelectorAll('.tab')[0].classList.remove('active');
            document.querySelectorAll('.tab')[1].classList.add('active');
            hideMessage();
        }

        // 메시지 표시
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        // 로그인 처리
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                document.querySelector('.auth-container').classList.add('loading');
                await signIn(username, password);
                showMessage('로그인 성공! 이동 중...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                showMessage(getErrorMessage(error), 'error');
            } finally {
                document.querySelector('.auth-container').classList.remove('loading');
            }
        }

        // 회원가입 처리
        async function handleSignup(e) {
            e.preventDefault();
            const username = document.getElementById('signupUsername').value;
            const nickname = document.getElementById('signupNickname').value;
            const password = document.getElementById('signupPassword').value;

            try {
                document.querySelector('.auth-container').classList.add('loading');
                await signUp(username, password, nickname);
                showMessage('회원가입 완료! 로그인 중...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                showMessage(getErrorMessage(error), 'error');
            } finally {
                document.querySelector('.auth-container').classList.remove('loading');
            }
        }

        // 에러 메시지 변환
        function getErrorMessage(error) {
            const messages = {
                'Invalid login credentials': '아이디 또는 비밀번호가 올바르지 않습니다.',
                'User already registered': '이미 가입된 아이디입니다.',
                'Password should be at least 6 characters': '비밀번호는 6자 이상이어야 합니다.'
            };
            return messages[error.message] || error.message;
        }

        // 이미 로그인되어 있으면 리다이렉트
        (async () => {
            const user = await getCurrentUser();
            if (user) {
                window.location.href = 'index.html';
            }
        })();
    </script>
</body>
</html>
