<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랭킹 - Simsim Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .logo:hover {
            color: #4ecdc4;
        }
        h1 {
            color: #fff;
            font-size: 42px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            margin-bottom: 40px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab {
            padding: 12px 24px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .tab:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }
        .tab.active {
            background: linear-gradient(135deg, #4ecdc4, #44b3ab);
            border-color: #4ecdc4;
            color: #fff;
        }
        .ranking-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .ranking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .game-title {
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .game-icon {
            font-size: 30px;
        }
        .ranking-list {
            list-style: none;
        }
        .ranking-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        .ranking-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .ranking-item.gold {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 193, 7, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .ranking-item.silver {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.2), rgba(158, 158, 158, 0.1));
            border: 1px solid rgba(192, 192, 192, 0.3);
        }
        .ranking-item.bronze {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(176, 108, 43, 0.1));
            border: 1px solid rgba(205, 127, 50, 0.3);
        }
        .rank {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            margin-right: 15px;
        }
        .rank.gold {
            background: linear-gradient(135deg, #ffd700, #ffb300);
            color: #333;
        }
        .rank.silver {
            background: linear-gradient(135deg, #c0c0c0, #9e9e9e);
            color: #333;
        }
        .rank.bronze {
            background: linear-gradient(135deg, #cd7f32, #b06c2b);
            color: #fff;
        }
        .rank.normal {
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
        }
        .player-info {
            flex: 1;
        }
        .player-name {
            color: #fff;
            font-size: 18px;
            margin-bottom: 3px;
        }
        .play-date {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }
        .player-score {
            color: #4ecdc4;
            font-size: 22px;
            font-weight: bold;
        }
        .empty-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 40px;
            font-size: 16px;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #fff;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 28px;
            }
            .ranking-container {
                padding: 20px;
            }
            .game-title {
                font-size: 20px;
            }
            .player-name {
                font-size: 16px;
            }
            .player-score {
                font-size: 18px;
            }
            .tab {
                padding: 10px 18px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">Simsim Games</a>
    </div>

    <h1>Ranking</h1>
    <p class="subtitle">게임별 최고 점수 랭킹</p>

    <div class="tabs">
        <button class="tab active" onclick="showRanking('narumi')">Narumi Game</button>
        <button class="tab" onclick="showRanking('flappy')">Flappy Bird</button>
    </div>

    <div class="ranking-container">
        <div class="ranking-header">
            <div class="game-title">
                <span class="game-icon" id="gameIcon"></span>
                <span id="gameTitle">Narumi Game</span>
            </div>
        </div>
        <ul class="ranking-list" id="rankingList">
            <li class="empty-message">데이터를 불러오는 중...</li>
        </ul>
    </div>

    <a href="index.html" class="back-link">← 게임 목록으로 돌아가기</a>

    <script src="js/supabase.js"></script>
    <script>
        const gameInfo = {
            narumi: { title: 'Narumi Game', icon: '🎮' },
            flappy: { title: 'Flappy Bird', icon: '🐦' }
        };

        let currentGame = 'narumi';

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '방금 전';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}분 전`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}시간 전`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)}일 전`;

            return date.toLocaleDateString('ko-KR');
        }

        function getRankClass(index) {
            if (index === 0) return 'gold';
            if (index === 1) return 'silver';
            if (index === 2) return 'bronze';
            return 'normal';
        }

        async function showRanking(gameId) {
            currentGame = gameId;

            // 탭 업데이트
            document.querySelectorAll('.tab').forEach((tab, i) => {
                tab.classList.toggle('active',
                    (gameId === 'narumi' && i === 0) || (gameId === 'flappy' && i === 1)
                );
            });

            // 헤더 업데이트
            const info = gameInfo[gameId];
            document.getElementById('gameIcon').textContent = info.icon;
            document.getElementById('gameTitle').textContent = info.title;

            // 로딩 표시
            const rankingList = document.getElementById('rankingList');
            rankingList.innerHTML = '<li class="empty-message">데이터를 불러오는 중...</li>';

            try {
                const scores = await getLeaderboard(gameId, 20);

                if (!scores || scores.length === 0) {
                    rankingList.innerHTML = '<li class="empty-message">아직 기록이 없습니다. 첫 번째 기록을 세워보세요!</li>';
                    return;
                }

                rankingList.innerHTML = scores.map((score, index) => {
                    const rankClass = getRankClass(index);
                    return `
                        <li class="ranking-item ${rankClass}">
                            <div class="rank ${rankClass}">${index + 1}</div>
                            <div class="player-info">
                                <div class="player-name">${score.nickname}</div>
                                <div class="play-date">${formatDate(score.created_at)}</div>
                            </div>
                            <div class="player-score">${score.score.toLocaleString()}</div>
                        </li>
                    `;
                }).join('');
            } catch (error) {
                console.error('랭킹 로드 실패:', error);
                rankingList.innerHTML = '<li class="empty-message">랭킹을 불러올 수 없습니다.</li>';
            }
        }

        // URL 파라미터로 게임 선택
        const urlParams = new URLSearchParams(window.location.search);
        const gameParam = urlParams.get('game');

        if (gameParam && gameInfo[gameParam]) {
            showRanking(gameParam);
        } else {
            showRanking('narumi');
        }
    </script>
</body>
</html>
