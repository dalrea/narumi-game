<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monster Collection - Simsim Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }
        .header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            color: #4ecdc4;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }
        .header-btns {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            font-size: 14px;
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }
        .stats-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px 25px;
            text-align: center;
            min-width: 120px;
        }
        .stat-box .label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }
        .stat-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        .game-area {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        .encounter-area {
            display: none;
        }
        .encounter-area.active {
            display: block;
        }
        .monster-display {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            75% { transform: translateX(5px) rotate(5deg); }
        }
        @keyframes catch-success {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }
        .monster-display.shaking {
            animation: shake 0.5s ease-in-out;
        }
        .monster-display.caught {
            animation: catch-success 0.5s ease-out forwards;
        }
        .monster-name {
            font-size: 28px;
            margin: 15px 0;
            color: #fff;
        }
        .monster-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }
        .monster-type {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .monster-rarity {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        .rarity-common { background: #95a5a6; }
        .rarity-uncommon { background: #3498db; }
        .rarity-rare { background: #9b59b6; }
        .rarity-epic { background: #e74c3c; }
        .rarity-legendary { background: linear-gradient(90deg, #f1c40f, #e67e22, #f1c40f); }
        .type-fire { background: #e74c3c; }
        .type-water { background: #3498db; }
        .type-grass { background: #27ae60; }
        .type-electric { background: #f1c40f; color: #333; }
        .type-ice { background: #74b9ff; }
        .type-rock { background: #795548; }
        .type-ghost { background: #6c5ce7; }
        .type-dragon { background: #8e44ad; }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }
        .btn-catch {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            padding: 15px 40px;
            font-size: 18px;
        }
        .btn-catch:hover {
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.5);
        }
        .btn-run {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            font-size: 18px;
        }
        .catch-rate {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }
        .result-message {
            font-size: 24px;
            margin: 20px 0;
            min-height: 40px;
        }
        .result-message.success { color: #2ecc71; }
        .result-message.fail { color: #e74c3c; }
        /* Collection/Dex view */
        .dex-area {
            display: none;
        }
        .dex-area.active {
            display: block;
        }
        .dex-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .dex-tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .dex-tab.active {
            background: #4ecdc4;
        }
        .dex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }
        .dex-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .dex-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }
        .dex-item.owned {
            border-color: #4ecdc4;
        }
        .dex-item.not-owned {
            opacity: 0.4;
        }
        .dex-item .icon {
            font-size: 40px;
            margin-bottom: 8px;
        }
        .dex-item .name {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        .dex-item .number {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }
        .dex-item.not-owned .icon {
            filter: grayscale(1) brightness(0.3);
        }
        .dex-item.not-owned .name {
            color: rgba(255, 255, 255, 0.3);
        }
        /* Detail modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .modal .monster-icon {
            font-size: 80px;
            margin-bottom: 15px;
        }
        .modal .monster-name {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .modal .monster-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin: 15px 0;
            line-height: 1.6;
        }
        .modal .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .modal .stat {
            text-align: center;
        }
        .modal .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #4ecdc4;
        }
        .modal .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }
        .close-modal {
            margin-top: 20px;
        }
        /* Explore button */
        .explore-btn {
            padding: 20px 50px;
            font-size: 22px;
            background: linear-gradient(135deg, #4ecdc4, #44a3aa);
        }
        .explore-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
        }
        /* User info */
        .user-info-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4ecdc4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .saving-indicator {
            font-size: 12px;
            color: #4ecdc4;
            margin-top: 10px;
        }
        .login-prompt {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 15px;
        }
        .login-prompt a {
            color: #4ecdc4;
        }
        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }
            .stats-bar {
                gap: 10px;
            }
            .stat-box {
                padding: 10px 15px;
                min-width: 80px;
            }
            .stat-box .value {
                font-size: 18px;
            }
            .game-area {
                padding: 20px;
            }
            .monster-display {
                width: 150px;
                height: 150px;
                font-size: 70px;
            }
            .monster-name {
                font-size: 22px;
            }
            .dex-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Monster Collection</h1>
        <div class="header-btns">
            <div class="user-info-bar" id="userInfoBar" style="display: none;">
                <div class="user-avatar" id="gameUserAvatar">?</div>
                <span id="gameUserName">Guest</span>
            </div>
            <a href="../index.html" class="btn btn-secondary">Home</a>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-box">
            <div class="label">Collected</div>
            <div class="value" id="collectedCount">0</div>
        </div>
        <div class="stat-box">
            <div class="label">Total</div>
            <div class="value" id="totalCount">30</div>
        </div>
        <div class="stat-box">
            <div class="label">Completion</div>
            <div class="value" id="completionRate">0%</div>
        </div>
        <div class="stat-box">
            <div class="label">Encounters</div>
            <div class="value" id="encounterCount">0</div>
        </div>
    </div>

    <div class="game-area">
        <!-- Main Menu -->
        <div id="menuArea" class="encounter-area active">
            <p class="explore-text">Go out and find wild monsters!</p>
            <button class="btn explore-btn" onclick="explore()">Explore</button>
            <br><br>
            <button class="btn btn-secondary" onclick="showDex()">View Collection</button>
            <p class="login-prompt" id="loginPrompt">
                <a href="../auth.html">Login</a> to save your collection!
            </p>
        </div>

        <!-- Encounter -->
        <div id="encounterArea" class="encounter-area">
            <p style="color: rgba(255,255,255,0.6);">A wild monster appeared!</p>
            <div class="monster-display" id="monsterDisplay"></div>
            <h2 class="monster-name" id="monsterName">???</h2>
            <div class="monster-info">
                <span class="monster-type" id="monsterType">Type</span>
                <span class="monster-rarity" id="monsterRarity">Rarity</span>
            </div>
            <p class="catch-rate" id="catchRate">Catch rate: 50%</p>
            <div class="result-message" id="resultMessage"></div>
            <div class="action-buttons" id="actionButtons">
                <button class="btn btn-catch" onclick="attemptCatch()">Catch!</button>
                <button class="btn btn-run" onclick="runAway()">Run</button>
            </div>
            <p class="saving-indicator" id="savingIndicator"></p>
        </div>

        <!-- Collection/Dex -->
        <div id="dexArea" class="dex-area">
            <div class="dex-tabs">
                <button class="dex-tab active" onclick="filterDex('all')">All</button>
                <button class="dex-tab" onclick="filterDex('owned')">Owned</button>
                <button class="dex-tab" onclick="filterDex('missing')">Missing</button>
            </div>
            <div class="dex-grid" id="dexGrid"></div>
            <br>
            <button class="btn btn-secondary" onclick="showMenu()">Back</button>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="monster-icon" id="modalIcon"></div>
            <h2 class="monster-name" id="modalName">Monster</h2>
            <div class="monster-info">
                <span class="monster-type" id="modalType">Type</span>
                <span class="monster-rarity" id="modalRarity">Rarity</span>
            </div>
            <p class="monster-desc" id="modalDesc">Description</p>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="modalCaught">0</div>
                    <div class="stat-label">Times Caught</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="modalFirst">-</div>
                    <div class="stat-label">First Caught</div>
                </div>
            </div>
            <button class="btn close-modal" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
    <script src="../js/supabase.js"></script>
    <script>
        // Monster Database
        const MONSTERS = [
            // Fire types
            { id: 1, name: "Flamby", icon: "🔥", type: "fire", rarity: "common", catchRate: 70, desc: "A small flame spirit that loves warm places." },
            { id: 2, name: "Blazecub", icon: "🦁", type: "fire", rarity: "uncommon", catchRate: 50, desc: "A lion cub with a fiery mane." },
            { id: 3, name: "Infernox", icon: "🐉", type: "fire", rarity: "epic", catchRate: 20, desc: "A dragon born from volcanic flames." },

            // Water types
            { id: 4, name: "Droplet", icon: "💧", type: "water", rarity: "common", catchRate: 70, desc: "A cheerful water drop that bounces around." },
            { id: 5, name: "Wavepup", icon: "🐬", type: "water", rarity: "uncommon", catchRate: 50, desc: "A playful dolphin that rides the waves." },
            { id: 6, name: "Tsunamor", icon: "🐋", type: "water", rarity: "epic", catchRate: 20, desc: "An ancient whale with power over tides." },

            // Grass types
            { id: 7, name: "Sproutie", icon: "🌱", type: "grass", rarity: "common", catchRate: 70, desc: "A tiny sprout full of life energy." },
            { id: 8, name: "Florabun", icon: "🐰", type: "grass", rarity: "uncommon", catchRate: 50, desc: "A bunny with flowers growing on its ears." },
            { id: 9, name: "Naturon", icon: "🌳", type: "grass", rarity: "epic", catchRate: 20, desc: "A walking tree that protects the forest." },

            // Electric types
            { id: 10, name: "Sparkle", icon: "⚡", type: "electric", rarity: "common", catchRate: 65, desc: "A ball of static electricity." },
            { id: 11, name: "Voltiger", icon: "🐯", type: "electric", rarity: "uncommon", catchRate: 45, desc: "A tiger that crackles with lightning." },
            { id: 12, name: "Thundera", icon: "🦅", type: "electric", rarity: "epic", catchRate: 18, desc: "A majestic bird that commands storms." },

            // Ice types
            { id: 13, name: "Snowfluff", icon: "❄️", type: "ice", rarity: "common", catchRate: 65, desc: "A fluffy snowball with a cold heart." },
            { id: 14, name: "Frostbear", icon: "🐻‍❄️", type: "ice", rarity: "uncommon", catchRate: 45, desc: "A polar bear that never feels cold." },
            { id: 15, name: "Glacior", icon: "🏔️", type: "ice", rarity: "epic", catchRate: 18, desc: "An ancient ice golem from frozen peaks." },

            // Rock types
            { id: 16, name: "Pebble", icon: "🪨", type: "rock", rarity: "common", catchRate: 70, desc: "A small living rock with big dreams." },
            { id: 17, name: "Bouldog", icon: "🐕", type: "rock", rarity: "uncommon", catchRate: 50, desc: "A sturdy dog made of solid stone." },
            { id: 18, name: "Titanrock", icon: "🗿", type: "rock", rarity: "epic", catchRate: 20, desc: "A massive golem from ancient times." },

            // Ghost types
            { id: 19, name: "Whisper", icon: "👻", type: "ghost", rarity: "uncommon", catchRate: 40, desc: "A shy ghost that only appears at night." },
            { id: 20, name: "Phantail", icon: "🐈‍⬛", type: "ghost", rarity: "rare", catchRate: 30, desc: "A spectral cat with nine ghostly tails." },
            { id: 21, name: "Dreadlord", icon: "💀", type: "ghost", rarity: "epic", catchRate: 15, desc: "A powerful spirit from the underworld." },

            // Dragon types
            { id: 22, name: "Drakeling", icon: "🐲", type: "dragon", rarity: "rare", catchRate: 25, desc: "A baby dragon learning to fly." },
            { id: 23, name: "Wyvernix", icon: "🦎", type: "dragon", rarity: "epic", catchRate: 15, desc: "A swift wyvern with razor-sharp claws." },
            { id: 24, name: "Celestrix", icon: "✨", type: "dragon", rarity: "legendary", catchRate: 5, desc: "A divine dragon said to grant wishes." },

            // Rare legendaries
            { id: 25, name: "Solarius", icon: "☀️", type: "fire", rarity: "legendary", catchRate: 5, desc: "The legendary sun guardian." },
            { id: 26, name: "Lunaris", icon: "🌙", type: "ice", rarity: "legendary", catchRate: 5, desc: "The legendary moon guardian." },
            { id: 27, name: "Terranos", icon: "🌍", type: "rock", rarity: "legendary", catchRate: 5, desc: "The legendary earth guardian." },
            { id: 28, name: "Tempestis", icon: "🌪️", type: "electric", rarity: "legendary", catchRate: 5, desc: "The legendary storm guardian." },
            { id: 29, name: "Oceanis", icon: "🌊", type: "water", rarity: "legendary", catchRate: 5, desc: "The legendary sea guardian." },
            { id: 30, name: "Floranis", icon: "🌸", type: "grass", rarity: "legendary", catchRate: 5, desc: "The legendary nature guardian." }
        ];

        // Rarity weights for spawning
        const RARITY_WEIGHTS = {
            common: 50,
            uncommon: 30,
            rare: 12,
            epic: 6,
            legendary: 2
        };

        // Game state
        let collection = {}; // { monsterId: { count: number, firstCaught: date } }
        let encounters = 0;
        let currentMonster = null;
        let currentUser = null;
        const GAME_ID = 'monster-collection';

        // Load collection from localStorage
        function loadCollection() {
            const saved = localStorage.getItem('monsterCollection');
            if (saved) {
                collection = JSON.parse(saved);
            }
            encounters = parseInt(localStorage.getItem('monsterEncounters')) || 0;
            updateStats();
        }

        // Save collection
        function saveCollection() {
            localStorage.setItem('monsterCollection', JSON.stringify(collection));
            localStorage.setItem('monsterEncounters', encounters);
        }

        // Update stats display
        function updateStats() {
            const collected = Object.keys(collection).length;
            const total = MONSTERS.length;
            const rate = Math.round((collected / total) * 100);

            document.getElementById('collectedCount').textContent = collected;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completionRate').textContent = rate + '%';
            document.getElementById('encounterCount').textContent = encounters;
        }

        // Get random monster based on rarity weights
        function getRandomMonster() {
            // Calculate total weight
            let totalWeight = 0;
            MONSTERS.forEach(m => {
                totalWeight += RARITY_WEIGHTS[m.rarity];
            });

            // Pick random
            let random = Math.random() * totalWeight;
            for (const monster of MONSTERS) {
                random -= RARITY_WEIGHTS[monster.rarity];
                if (random <= 0) {
                    return monster;
                }
            }
            return MONSTERS[0];
        }

        // Show area
        function showArea(areaId) {
            document.querySelectorAll('.encounter-area, .dex-area').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(areaId).classList.add('active');
        }

        function showMenu() {
            showArea('menuArea');
        }

        function showDex() {
            renderDex('all');
            showArea('dexArea');
        }

        // Explore - encounter a monster
        function explore() {
            currentMonster = getRandomMonster();
            encounters++;
            saveCollection();
            updateStats();

            // Reset UI
            document.getElementById('resultMessage').textContent = '';
            document.getElementById('resultMessage').className = 'result-message';
            document.getElementById('actionButtons').style.display = 'flex';
            document.getElementById('savingIndicator').textContent = '';

            // Display monster
            const display = document.getElementById('monsterDisplay');
            display.textContent = currentMonster.icon;
            display.style.background = getTypeGradient(currentMonster.type);
            display.className = 'monster-display';

            document.getElementById('monsterName').textContent = currentMonster.name;

            const typeEl = document.getElementById('monsterType');
            typeEl.textContent = currentMonster.type.charAt(0).toUpperCase() + currentMonster.type.slice(1);
            typeEl.className = 'monster-type type-' + currentMonster.type;

            const rarityEl = document.getElementById('monsterRarity');
            rarityEl.textContent = currentMonster.rarity.charAt(0).toUpperCase() + currentMonster.rarity.slice(1);
            rarityEl.className = 'monster-rarity rarity-' + currentMonster.rarity;

            document.getElementById('catchRate').textContent = `Catch rate: ${currentMonster.catchRate}%`;

            showArea('encounterArea');
        }

        function getTypeGradient(type) {
            const colors = {
                fire: 'linear-gradient(135deg, #e74c3c, #c0392b)',
                water: 'linear-gradient(135deg, #3498db, #2980b9)',
                grass: 'linear-gradient(135deg, #27ae60, #1e8449)',
                electric: 'linear-gradient(135deg, #f1c40f, #d4ac0d)',
                ice: 'linear-gradient(135deg, #74b9ff, #0984e3)',
                rock: 'linear-gradient(135deg, #795548, #5d4037)',
                ghost: 'linear-gradient(135deg, #6c5ce7, #5f27cd)',
                dragon: 'linear-gradient(135deg, #8e44ad, #6c3483)'
            };
            return colors[type] || colors.fire;
        }

        // Attempt to catch
        async function attemptCatch() {
            const display = document.getElementById('monsterDisplay');
            display.classList.add('shaking');

            document.getElementById('actionButtons').style.display = 'none';

            setTimeout(async () => {
                display.classList.remove('shaking');

                const success = Math.random() * 100 < currentMonster.catchRate;
                const messageEl = document.getElementById('resultMessage');

                if (success) {
                    display.classList.add('caught');
                    messageEl.textContent = `🎉 You caught ${currentMonster.name}!`;
                    messageEl.className = 'result-message success';

                    // Add to collection
                    if (!collection[currentMonster.id]) {
                        collection[currentMonster.id] = {
                            count: 0,
                            firstCaught: new Date().toISOString()
                        };
                    }
                    collection[currentMonster.id].count++;
                    saveCollection();
                    updateStats();

                    // Save to server if logged in
                    if (currentUser) {
                        await saveToServer();
                    }
                } else {
                    messageEl.textContent = `💨 ${currentMonster.name} escaped!`;
                    messageEl.className = 'result-message fail';
                }

                // Show continue buttons after delay
                setTimeout(() => {
                    document.getElementById('actionButtons').innerHTML = `
                        <button class="btn explore-btn" onclick="explore()">Continue Exploring</button>
                        <button class="btn btn-secondary" onclick="showMenu()">Back to Menu</button>
                    `;
                    document.getElementById('actionButtons').style.display = 'flex';
                }, 500);
            }, 1000);
        }

        function runAway() {
            document.getElementById('resultMessage').textContent = 'You ran away safely!';
            document.getElementById('actionButtons').innerHTML = `
                <button class="btn explore-btn" onclick="explore()">Continue Exploring</button>
                <button class="btn btn-secondary" onclick="showMenu()">Back to Menu</button>
            `;
        }

        // Render dex
        function renderDex(filter) {
            const grid = document.getElementById('dexGrid');
            let html = '';

            // Update active tab
            document.querySelectorAll('.dex-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent.toLowerCase() === filter ||
                    (filter === 'all' && tab.textContent === 'All') ||
                    (filter === 'owned' && tab.textContent === 'Owned') ||
                    (filter === 'missing' && tab.textContent === 'Missing')) {
                    tab.classList.add('active');
                }
            });

            MONSTERS.forEach(monster => {
                const owned = collection[monster.id];

                if (filter === 'owned' && !owned) return;
                if (filter === 'missing' && owned) return;

                html += `
                    <div class="dex-item ${owned ? 'owned' : 'not-owned'}" onclick="showMonsterDetail(${monster.id})">
                        <div class="number">#${String(monster.id).padStart(3, '0')}</div>
                        <div class="icon">${monster.icon}</div>
                        <div class="name">${owned ? monster.name : '???'}</div>
                    </div>
                `;
            });

            grid.innerHTML = html || '<p style="grid-column: 1/-1; text-align: center; color: rgba(255,255,255,0.5);">No monsters found</p>';
        }

        function filterDex(filter) {
            renderDex(filter);
        }

        // Show monster detail modal
        function showMonsterDetail(id) {
            const monster = MONSTERS.find(m => m.id === id);
            const owned = collection[id];

            if (!owned) return; // Can't view details of uncaught monsters

            document.getElementById('modalIcon').textContent = monster.icon;
            document.getElementById('modalName').textContent = monster.name;

            const typeEl = document.getElementById('modalType');
            typeEl.textContent = monster.type.charAt(0).toUpperCase() + monster.type.slice(1);
            typeEl.className = 'monster-type type-' + monster.type;

            const rarityEl = document.getElementById('modalRarity');
            rarityEl.textContent = monster.rarity.charAt(0).toUpperCase() + monster.rarity.slice(1);
            rarityEl.className = 'monster-rarity rarity-' + monster.rarity;

            document.getElementById('modalDesc').textContent = monster.desc;
            document.getElementById('modalCaught').textContent = owned.count;

            const firstDate = new Date(owned.firstCaught);
            document.getElementById('modalFirst').textContent = firstDate.toLocaleDateString();

            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal(event) {
            if (!event || event.target.classList.contains('modal-overlay')) {
                document.getElementById('modalOverlay').classList.remove('active');
            }
        }

        // User handling
        async function updateUserInfo() {
            currentUser = await getCurrentUser();
            const userInfoBar = document.getElementById('userInfoBar');
            const loginPrompt = document.getElementById('loginPrompt');

            if (currentUser) {
                const nickname = currentUser.user_metadata?.nickname || currentUser.email.split('@')[0];
                document.getElementById('gameUserName').textContent = nickname;
                document.getElementById('gameUserAvatar').textContent = nickname.charAt(0).toUpperCase();
                userInfoBar.style.display = 'flex';
                loginPrompt.style.display = 'none';

                // Try to load from server
                await loadFromServer();
            } else {
                userInfoBar.style.display = 'none';
                loginPrompt.style.display = 'block';
            }
        }

        // Server sync (using score as completion percentage, metadata for collection)
        async function saveToServer() {
            if (!currentUser) return;

            const indicator = document.getElementById('savingIndicator');
            indicator.textContent = 'Saving...';

            try {
                const completionScore = Object.keys(collection).length;
                await saveScore(GAME_ID, completionScore);
                indicator.textContent = '✓ Saved!';
            } catch (e) {
                console.log('Save failed:', e);
                indicator.textContent = 'Save failed';
            }
        }

        async function loadFromServer() {
            try {
                const serverScore = await getMyHighScore(GAME_ID);
                // Server score represents collection count - just for leaderboard
            } catch (e) {
                console.log('Load failed:', e);
            }
        }

        // Initialize
        async function init() {
            loadCollection();
            await updateUserInfo();
        }

        init();
    </script>
</body>
</html>
