<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simsim Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        /* 헤더 영역 */
        .header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .logo {
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4ecdc4, #44b3ab);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }
        .nickname {
            font-size: 16px;
        }
        .auth-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn-login {
            background: linear-gradient(135deg, #4ecdc4, #44b3ab);
            color: white;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.4);
        }
        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        /* 메인 타이틀 */
        h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            margin-bottom: 50px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 900px;
            width: 100%;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
        }
        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .game-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .game-icon.narumi {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
        }
        .game-icon.flappy {
            background: linear-gradient(145deg, #4ecdc4, #44b3ab);
        }
        .game-icon.coming-soon {
            background: linear-gradient(145deg, #666, #555);
        }
        .game-title {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .game-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.5;
        }
        .game-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .game-card.disabled:hover {
            transform: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }
        footer {
            margin-top: 60px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 20px;
            }
            h1 {
                font-size: 32px;
            }
            .subtitle {
                font-size: 14px;
            }
            .game-grid {
                gap: 20px;
            }
            .game-card {
                padding: 20px;
            }
            .game-icon {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
            .game-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Simsim Games</div>
        <div class="user-area">
            <!-- 로그인 전 -->
            <a href="auth.html" class="auth-btn btn-login" id="loginBtn">로그인</a>

            <!-- 로그인 후 -->
            <div class="user-info hidden" id="userInfo">
                <div class="avatar" id="userAvatar">?</div>
                <span class="nickname" id="userNickname">닉네임</span>
            </div>
            <button class="auth-btn btn-logout hidden" id="logoutBtn" onclick="handleLogout()">로그아웃</button>
        </div>
    </div>

    <h1>Simsim Games</h1>
    <p class="subtitle">재미있는 미니 게임 모음</p>

    <div class="game-grid">
        <a href="narumi/game.html" class="game-card">
            <div class="game-icon narumi">
                <img src="narumi/narumi0.png" alt="Narumi" style="width: 100%; height: 100%; object-fit: contain; border-radius: 15px;">
            </div>
            <h2 class="game-title">Narumi Game</h2>
            <p class="game-desc">장애물을 피하고 코인을 모아 레벨업하세요! 귀여운 나루미 카드를 수집할 수 있어요.</p>
        </a>

        <a href="flappy/game.html" class="game-card">
            <div class="game-icon flappy">🐦</div>
            <h2 class="game-title">Flappy Bird</h2>
            <p class="game-desc">파이프 사이를 날아가세요! 터치 또는 스페이스바로 점프!</p>
        </a>

        <a href="tetris/game.html" class="game-card">
            <div class="game-icon" style="background: linear-gradient(145deg, #9b59b6, #8e44ad);">🧱</div>
            <h2 class="game-title">Tetris</h2>
            <p class="game-desc">클래식 블록 퍼즐 게임! 블록을 쌓아 줄을 완성하세요!</p>
        </a>

        <a href="ranking.html" class="game-card">
            <div class="game-icon coming-soon" style="background: linear-gradient(145deg, #f39c12, #e67e22);">🏆</div>
            <h2 class="game-title">Ranking</h2>
            <p class="game-desc">게임별 최고 점수 랭킹을 확인하세요!</p>
        </a>
    </div>

    <footer>
        &copy; 2025 Simsim Games
    </footer>

    <script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
    <script src="js/supabase.js"></script>
    <script>
        // UI 요소
        const loginBtn = document.getElementById('loginBtn');
        const userInfo = document.getElementById('userInfo');
        const userAvatar = document.getElementById('userAvatar');
        const userNickname = document.getElementById('userNickname');
        const logoutBtn = document.getElementById('logoutBtn');

        // 로그인 상태 업데이트
        async function updateAuthUI() {
            const user = await getCurrentUser();

            if (user) {
                // 로그인 상태
                loginBtn.classList.add('hidden');
                userInfo.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');

                const nickname = user.user_metadata?.nickname || user.email.split('@')[0];
                userNickname.textContent = nickname;
                userAvatar.textContent = nickname.charAt(0).toUpperCase();
            } else {
                // 로그아웃 상태
                loginBtn.classList.remove('hidden');
                userInfo.classList.add('hidden');
                logoutBtn.classList.add('hidden');
            }
        }

        // 로그아웃 처리
        async function handleLogout() {
            try {
                await signOut();
                updateAuthUI();
            } catch (error) {
                console.error('로그아웃 실패:', error);
            }
        }

        // 인증 상태 변경 감지
        onAuthStateChange((event, session) => {
            updateAuthUI();
        });

        // 초기 로드
        updateAuthUI();
    </script>
</body>
</html>
