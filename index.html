<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youji Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            margin-bottom: 50px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 900px;
            width: 100%;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
        }
        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .game-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .game-icon.narumi {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
        }
        .game-icon.flappy {
            background: linear-gradient(145deg, #4ecdc4, #44b3ab);
        }
        .game-icon.coming-soon {
            background: linear-gradient(145deg, #666, #555);
        }
        .game-title {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .game-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.5;
        }
        .game-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .game-card.disabled:hover {
            transform: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }
        footer {
            margin-top: 60px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 32px;
            }
            .subtitle {
                font-size: 14px;
            }
            .game-grid {
                gap: 20px;
            }
            .game-card {
                padding: 20px;
            }
            .game-icon {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
            .game-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <h1>Youji Games</h1>
    <p class="subtitle">재미있는 미니 게임 모음</p>

    <div class="game-grid">
        <a href="narumi/game.html" class="game-card">
            <div class="game-icon narumi">
                <img src="narumi/narumi0.png" alt="Narumi" style="width: 100%; height: 100%; object-fit: contain; border-radius: 15px;">
            </div>
            <h2 class="game-title">Narumi Game</h2>
            <p class="game-desc">장애물을 피하고 코인을 모아 레벨업하세요! 귀여운 나루미 카드를 수집할 수 있어요.</p>
        </a>

        <a href="flappy/game.html" class="game-card">
            <div class="game-icon flappy">🐦</div>
            <h2 class="game-title">Flappy Bird</h2>
            <p class="game-desc">파이프 사이를 날아가세요! 터치 또는 스페이스바로 점프!</p>
        </a>

        <div class="game-card disabled">
            <div class="game-icon coming-soon">?</div>
            <h2 class="game-title">Coming Soon</h2>
            <p class="game-desc">새로운 게임이 곧 추가됩니다!</p>
        </div>
    </div>

    <footer>
        &copy; 2025 Youji Games
    </footer>
</body>
</html>
